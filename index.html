  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Practice Units 4–6</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #fff1eb 0%, #ffd7ba 35%, #ff9a76 68%, #c2410c 100%);
      --card: rgba(255, 255, 255, 0.94);
      --card-soft: rgba(255, 247, 237, 0.9);
      --text: #2f1b12;
      --muted: #7c4a32;
      --border: rgba(251, 146, 60, 0.28);
      --correct: #15803d;
      --incorrect: #b91c1c;
      --button: linear-gradient(135deg, #f97316 0%, #dc2626 100%);
      --button-hover: linear-gradient(135deg, #ea580c 0%, #b91c1c 100%);
      --option: #fff7ed;
      --option-hover: #ffedd5;
      --option-border: #fdba74;
      --shadow: 0 18px 45px rgba(124, 45, 18, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text);
      line-height: 1.5;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.45), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(255, 237, 213, 0.5), transparent 26%),
        radial-gradient(circle at 50% 90%, rgba(127, 29, 29, 0.18), transparent 35%);
    }

    .container {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 28px 18px;
      position: relative;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 28px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.9rem, 5vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: #7c2d12;
    }

    h1 + p {
      margin-top: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    label {
      display: grid;
      gap: 7px;
      color: #7c2d12;
      font-weight: 700;
      font-size: 0.92rem;
    }

    select, button {
      width: 100%;
      font-size: 1rem;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      font-family: inherit;
    }

    select {
      background: #fffaf5;
      color: var(--text);
      min-height: 48px;
    }

    button {
      cursor: pointer;
      background: var(--button);
      color: white;
      border: none;
      font-weight: 800;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 18px rgba(194, 65, 12, 0.24);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    button:hover:not(:disabled) {
      background: var(--button-hover);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(194, 65, 12, 0.28);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      cursor: default;
      opacity: 0.9;
    }

    button.secondary {
      background: linear-gradient(135deg, #7c2d12 0%, #9a3412 100%);
    }

    button.secondary:hover:not(:disabled) {
      background: linear-gradient(135deg, #64210d 0%, #7c2d12 100%);
    }

    .quiz-area {
      display: none;
      margin-top: 22px;
    }

    .meta {
      display: inline-block;
      color: #9a3412;
      background: #ffedd5;
      border: 1px solid #fed7aa;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .question {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 850;
      line-height: 1.28;
      margin: 20px 0;
      padding: 20px;
      border-radius: 22px;
      background: linear-gradient(135deg, #fff7ed 0%, #fff1eb 100%);
      border: 1px solid #fed7aa;
    }

    .options {
      display: grid;
      gap: 13px;
    }

    .option-btn {
      text-align: left;
      background: var(--option);
      color: var(--text);
      border: 1px solid var(--option-border);
      font-weight: 800;
      box-shadow: none;
      min-height: 54px;
    }

    .option-btn:hover:not(:disabled) {
      background: var(--option-hover);
      color: #7c2d12;
      box-shadow: 0 8px 18px rgba(251, 146, 60, 0.18);
    }

    .option-btn.correct {
      background: #dcfce7;
      border-color: #86efac;
      color: var(--correct);
    }

    .option-btn.incorrect {
      background: #fee2e2;
      border-color: #fca5a5;
      color: var(--incorrect);
    }

    .feedback {
      min-height: 82px;
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: var(--card-soft);
      border: 1px solid #fed7aa;
      color: var(--text);
    }

    .feedback.correct-text {
      border-left: 8px solid var(--correct);
      background: #f0fdf4;
    }

    .feedback.incorrect-text {
      border-left: 8px solid var(--incorrect);
      background: #fff1f2;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: rgba(255, 250, 245, 0.9);
      border: 1px solid #fed7aa;
      border-radius: 18px;
      padding: 13px 10px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      color: #c2410c;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .small {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 650;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .container {
        padding: 12px;
      }

      .card {
        padding: 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 2rem;
      }

      h1 + p {
        font-size: 0.98rem;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      select, button {
        min-height: 52px;
        font-size: 1rem;
      }

      .question {
        padding: 16px;
        font-size: 1.25rem;
      }

      .option-btn {
        min-height: 58px;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Vocabulary Practice: Units 4–6</h1>
      <p>This practice app tests definitions first, then sentence gaps. Words answered incorrectly come back more often.</p>

      <div class="controls" id="setupControls">
        <label>
          Unit
          <select id="unitSelect">
            <option value="all">Units 4–6</option>
            <option value="4">Unit 4</option>
            <option value="5">Unit 5</option>
            <option value="6">Unit 6</option>
          </select>
        </label>

        <label>
          Practice Mode
          <select id="modeSelect">
            <option value="mixed">Mixed: Definitions + Sentences</option>
            <option value="definition">Definitions Only</option>
            <option value="sentence">Sentences Only</option>
          </select>
        </label>

        <label>
          Questions
          <select id="questionCountSelect">
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="999" selected="">Practice Until I Stop</option>
          </select>
        </label>
      </div>

      <button id="startBtn">Start Practice</button>

      <div class="quiz-area" id="quizArea">
        <div class="meta" id="meta"></div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback">Choose an answer.</div>

        <div class="controls">
          <button id="nextBtn" class="hidden">Next Question</button>
          <button id="restartBtn" class="secondary">Restart</button>
        </div>

        <div class="stats">
          <div class="stat"><strong id="answeredStat">0</strong><span>Answered</span></div>
          <div class="stat"><strong id="correctStat">0</strong><span>Correct</span></div>
          <div class="stat"><strong id="incorrectStat">0</strong><span>Incorrect</span></div>
          <div class="stat"><strong id="accuracyStat">0%</strong><span>Accuracy</span></div>
        </div>

        <p class="small" id="reviewList"></p>
      </div>
    </div>
  </div>

      {unit:6, word:'required', pos:'adjective', def:'needed; necessary', ar:'مطلوب', sentence:'A passport is ______ for travel.', distractors:['negative','glad','temporary']},
      {unit:6, word:'glad', pos:'adjective', def:'happy', ar:'سعيد', sentence:'I am ______ you came.', distractors:['required','negative','permanent']},
      {unit:6, word:'direction', pos:'noun', def:'the way something moves or develops', ar:'اتجاه', sentence:'The company is moving in a new ______.', distractors:['deadline','promotion','benefit']},
      {unit:6, word:'summarize', pos:'verb', def:'to give the main points briefly', ar:'يلخّص', sentence:'Please ______ the article in five sentences.', distractors:['advertise','replace','monitor']},
      {unit:6, word:'promotion', pos:'noun', def:'moving to a better or higher job', ar:'ترقية', sentence:'She received a/an ______ at work.', distractors:['employer','deadline','risk']},
      {unit:6, word:'employer', pos:'noun', def:'a person or company that gives jobs to people', ar:'صاحب عمل', sentence:'A/An ______ gave him a raise.', distractors:['lawyer','agency','promotion']},
      {unit:6, word:'negative', pos:'adjective', def:'bad or not positive', ar:'سلبي', sentence:'The news about the accident was very ______.', distractors:['glad','pleasant','annual']},
      {unit:6, word:'junk food', pos:'noun', def:'unhealthy food that is quick and easy to eat', ar:'وجبات سريعة غير صحية', sentence:'Too much ______ is unhealthy.', distractors:['lifestyle','benefit','deadline']}
    ];

    let pool = [];
    let basePool = [];
    let reviewPool = [];
    let currentItem = null;
    let currentMode = 'definition';
    let answered = 0;
    let correct = 0;
    let incorrect = 0;
    let maxQuestions = 10;
    let missedWords = {};
    let answeredCurrent = false;

    const startBtn = document.getElementById('startBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const quizArea = document.getElementById('quizArea');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const metaEl = document.getElementById('meta');
    const unitSelect = document.getElementById('unitSelect');
    const modeSelect = document.getElementById('modeSelect');
    const questionCountSelect = document.getElementById('questionCountSelect');

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getSelectedVocab() {
      const unit = unitSelect.value;
      return unit === 'all' ? vocab : vocab.filter(item => String(item.unit) === unit);
    }

    function buildPool() {
      const selected = getSelectedVocab();
      const practiceUntilStop = maxQuestions === 999;

      if (practiceUntilStop) {
        // In unlimited practice, go through every selected word once before repeating.
        // Missed words go into a separate review pool and may reappear sooner.
        basePool = shuffle(selected);
        reviewPool = [];
        pool = [...basePool];
        return;
      }

      // In fixed-length practice, keep the original adaptive behavior.
      pool = [];
      selected.forEach(item => {
        pool.push(item);
        const misses = missedWords[item.word] || 0;
        for (let i = 0; i < misses; i++) pool.push(item);
      });
      pool = shuffle(pool);
    }

    function chooseQuestionMode() {
      const selectedMode = modeSelect.value;
      if (selectedMode !== 'mixed') return selectedMode;
      return Math.random() < 0.5 ? 'definition' : 'sentence';
    }

    function startQuiz() {
      answered = 0;
      correct = 0;
      incorrect = 0;
      missedWords = {};
      maxQuestions = Number(questionCountSelect.value);
      quizArea.style.display = 'block';
      startBtn.textContent = 'Restart Practice';
      buildPool();
      showQuestion();
    }

    function showQuestion() {
      if (answered >= maxQuestions) {
        endQuiz();
        return;
      }

      if (maxQuestions === 999) {
        if (pool.length === 0) {
          // After a full pass, start a new shuffled pass.
          pool = shuffle(getSelectedVocab());
        }

        // Review a missed word sometimes, but do not let review fully take over.
        if (reviewPool.length > 0 && Math.random() < 0.35) {
          currentItem = reviewPool.pop();
        } else {
          currentItem = pool.pop();
        }
      } else {
        if (pool.length === 0) buildPool();
        currentItem = pool.pop();
      }

      answeredCurrent = false;
      currentMode = chooseQuestionMode();

      const options = shuffle([currentItem.word, ...currentItem.distractors]);

      metaEl.textContent = `Unit ${currentItem.unit} • ${currentItem.pos} • Question ${answered + 1}${maxQuestions === 999 ? '' : ' of ' + maxQuestions}`;
      questionEl.textContent = currentMode === 'definition'
        ? currentItem.def
        : currentItem.sentence;

      optionsEl.innerHTML = '';
      options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
        btn.onclick = () => checkAnswer(btn, option);
        optionsEl.appendChild(btn);
      });

      feedbackEl.className = 'feedback';
      feedbackEl.textContent = 'Choose an answer.';
      nextBtn.classList.add('hidden');
      updateStats();
    }

    function checkAnswer(button, chosen) {
      if (answeredCurrent) return;
      answeredCurrent = true;
      answered++;

      const buttons = Array.from(document.querySelectorAll('.option-btn'));
      buttons.forEach(btn => btn.disabled = true);

      if (chosen === currentItem.word) {
        correct++;
        button.classList.add('correct');
        if (missedWords[currentItem.word]) {
          missedWords[currentItem.word] = Math.max(0, missedWords[currentItem.word] - 1);
        }
        feedbackEl.className = 'feedback correct-text';
        feedbackEl.innerHTML = `<strong>Correct!</strong><br><strong>${currentItem.word}</strong> means: ${currentItem.def}.<br>Arabic: ${currentItem.ar}`;
      } else {
        incorrect++;
        missedWords[currentItem.word] = (missedWords[currentItem.word] || 0) + 2;
        if (maxQuestions === 999) {
          reviewPool.push(currentItem, currentItem);
          reviewPool = shuffle(reviewPool);
        }
        button.classList.add('incorrect');
        buttons.forEach(btn => {
          if (btn.textContent.endsWith(currentItem.word)) btn.classList.add('correct');
        });
        feedbackEl.className = 'feedback incorrect-text';
        feedbackEl.innerHTML = `<strong>Incorrect.</strong><br>The correct answer is <strong>${currentItem.word}</strong>.<br>Meaning: ${currentItem.def}.<br>Arabic: ${currentItem.ar}`;
      }

      if (maxQuestions !== 999) buildPool();
      nextBtn.classList.remove('hidden');
      updateStats();
    }

    function updateStats() {
      document.getElementById('answeredStat').textContent = answered;
      document.getElementById('correctStat').textContent = correct;
      document.getElementById('incorrectStat').textContent = incorrect;
      const accuracy = answered === 0 ? 0 : Math.round((correct / answered) * 100);
      document.getElementById('accuracyStat').textContent = `${accuracy}%`;

      const missed = Object.entries(missedWords)
        .filter(([_, count]) => count > 0)
        .map(([word]) => word);
      document.getElementById('reviewList').textContent = missed.length
        ? `Needs review: ${missed.join(', ')}`
        : 'Needs review: none yet';
    }

    function endQuiz() {
      questionEl.textContent = 'Practice complete!';
      optionsEl.innerHTML = '';
      nextBtn.classList.add('hidden');
      const accuracy = answered === 0 ? 0 : Math.round((correct / answered) * 100);
      feedbackEl.className = 'feedback';
      feedbackEl.innerHTML = `<strong>Final score:</strong> ${correct}/${answered} (${accuracy}%).<br>${getReviewMessage()}`;
      metaEl.textContent = 'Finished';
      updateStats();
    }

    function getReviewMessage() {
      const missed = Object.entries(missedWords)
        .filter(([_, count]) => count > 0)
        .map(([word]) => word);
      if (!missed.length) return 'Great work. No review words.';
      return `Review these words: ${missed.join(', ')}`;
    }

    startBtn.addEventListener('click', startQuiz);
    nextBtn.addEventListener('click', showQuestion);
    restartBtn.addEventListener('click', startQuiz);
  </script>


</body></html>
